spring:
  application:
    name: auth-api
  datasource:
    url: jdbc:postgresql://localhost:5432/winwin
    username: winwin
    password: secret
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

winwin:
  internal:
    token: supersecrettoken123
  jwt:
    secret: myjwtsecretmyjwtsecretmyjwtsecret32
    expiration: 86400000
  data:
    api:
      url: http://localhost:8081
