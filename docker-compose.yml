services:
  auth-api:
    build:
      context: .
      dockerfile: Dockerfile
      target: auth-runtime
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=local
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/winwin
      - SPRING_DATASOURCE_USERNAME=winwin
      - SPRING_DATASOURCE_PASSWORD=secret
      - SERVER_PORT=8080
      - WINWIN_JWT_SECRET=myjwtsecretmyjwtsecretmyjwtsecret32
      - WINWIN_INTERNAL_TOKEN=supersecrettoken123
      - WINWIN_DATA_API_URL=http://data-api:8081

    depends_on:
      postgres:
        condition: service_healthy

  data-api:
    build:
      context: .
      dockerfile: Dockerfile
      target: data-runtime
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=local
      - SERVER_PORT=8081
      - WINWIN_INTERNAL_TOKEN=supersecrettoken123


  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: winwin
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: winwin
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U winwin -d winwin"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: